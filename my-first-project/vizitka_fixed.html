<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ольга Харленок — визитка</title>
  <style>
    :root{
      --bg:#0B1220;
      --card:#0F1B2D;
      --text:#F2F5FA;
      --muted:#A8B3C7;
      --accent:#1FBF9B;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:32px}
    .card{width:100%;max-width:760px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:16px;border:1px solid rgba(255,255,255,0.03);padding:28px;display:flex;gap:20px;align-items:center;box-shadow:0 8px 30px rgba(2,6,23,0.6);background-color:var(--card)}
    .avatar{flex:0 0 120px;height:120px;border-radius:12px;background:linear-gradient(135deg, rgba(31,191,155,0.08), rgba(255,255,255,0.02));display:flex;align-items:center;justify-content:center;overflow:hidden}
    .avatar svg{width:64px;height:64px;opacity:0.9}
    .info{flex:1;min-width:0}
    .name{font-size:28px;font-weight:700;line-height:1.05;margin:0 0 6px 0;background:linear-gradient(90deg,#9bf6e7,var(--accent),#86f0d1,#c7ffeb);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;filter:drop-shadow(0 6px 24px rgba(31,191,155,0.12))}
    .name::after{content:'';position:absolute;left:-8px;right:-8px;top:6px;height:30px;background:linear-gradient(90deg, rgba(31,191,155,0.08), rgba(31,191,155,0.02));filter:blur(18px);z-index:-1;opacity:0.9;transform:translateX(-2px);animation:glow 3.6s ease-in-out infinite}
    @keyframes glow{0%,100%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
    .role{color:var(--muted);margin:0 0 14px 0;font-size:14px}
    .actions{display:flex;gap:12px;align-items:center}
    .socials{display:flex;gap:10px}
    .socials a{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;background:transparent;border:1px solid transparent;transition:all .22s ease;color:var(--muted)}
    .socials a svg{width:20px;height:20px;display:block}
    .socials a:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(11,18,32,0.6);color:var(--accent);border-color:rgba(31,191,155,0.12);background:linear-gradient(180deg, rgba(31,191,155,0.04), rgba(31,191,155,0.02))}
    .write-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:linear-gradient(90deg, rgba(31,191,155,0.14), rgba(31,191,155,0.08));color:var(--text);border:1px solid rgba(31,191,155,0.14);box-shadow:0 6px 18px rgba(31,191,155,0.06);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
    .write-btn:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(31,191,155,0.12)}
    .write-btn:active{transform:translateY(-1px)}
    .write-btn .arrow{display:inline-block;transition:transform .25s ease}
    .write-btn:hover .arrow{transform:translateX(6px)}
    .meta{margin-top:12px;color:var(--muted);font-size:13px}
    @media (max-width:640px){.card{flex-direction:column;align-items:stretch;padding:20px}.avatar{margin:0 auto}.name{font-size:22px;text-align:center}.role{text-align:center}.actions{justify-content:center}}
    a:focus{outline:2px solid rgba(31,191,155,0.14);outline-offset:3px;border-radius:8px}
  </style>
</head>
<body>
  <main class="card" role="region" aria-label="Визитка Ольга Харленок">
    <div class="avatar" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden>
        <rect width="100" height="100" rx="12" fill="url(#g)" />
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0" stop-color="#133047" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#0b2536" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
        <g transform="translate(12,18)" fill="none" stroke="white" stroke-opacity="0.9" stroke-width="5" stroke-linecap="round">
          <path d="M6 58 L38 6 L70 58" stroke="url(#s)"/>
        </g>
        <defs>
          <linearGradient id="s" x1="0" x2="1">
            <stop offset="0" stop-color="#1FBF9B"/>
            <stop offset="1" stop-color="#86F0D1"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="info">
      <h1 class="name">Ольга Харленок</h1>
      <p class="role">специалист по MICE в Японии</p>

      <div class="actions">
        <div class="socials" aria-label="Социальная сеть">
          <a href="https://t.me/mice_japan" target="_blank" rel="noopener" title="Telegram — mice_japan">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden>
              <path d="M22 2L2 11l5 2 2 6 3-3 6 4 4-18z" fill="currentColor"/>
            </svg>
          </a>
        </div>

        <button class="write-btn" id="writeBtn" aria-label="Написать мне">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden>
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/>
          </svg>
          Написать мне
          <span class="arrow">→</span>
        </button>
      </div>

      <p class="meta">Телеграм: <a href="https://t.me/mice_japan" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">@mice_japan</a></p>
    </div>
  </main>

  <script>
    (function(){
      const tg = 'https://t.me/mice_japan';
      const write = document.getElementById('writeBtn');
      write.addEventListener('click', function(){
        const win = window.open(tg, '_blank', 'noopener');
        if(!win) location.href = tg;
      });
    })();
  </script>
</body>
</html>
